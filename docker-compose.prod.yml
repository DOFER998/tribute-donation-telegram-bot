services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fundraiser
      POSTGRES_PASSWORD: ${POSTGRES__PASSWORD}
      POSTGRES_DB: fundraiser_bot
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fundraiser"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS__PASSWORD}"]
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS__PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  bot:
    image: ghcr.io/dofer998/tribute-donation-telegram-bot:latest
    pull_policy: always
    env_file: .env
    environment:
      APP__HOST: 0.0.0.0
      APP__PORT: 9090
      APP__DEBUG: ${APP__DEBUG:-false}
      POSTGRES__HOST: postgres
      POSTGRES__PORT: 5432
      POSTGRES__USER: fundraiser
      POSTGRES__DATABASE: fundraiser_bot
      REDIS__HOST: redis
      REDIS__PORT: 6379
      REDIS__NAME: 0
      DIGEST__HOUR: ${DIGEST__HOUR:-21}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "9090:9090"
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
